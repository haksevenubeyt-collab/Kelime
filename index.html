<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Otomatik Kelime Türetmece</title>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #f0f2f5; }
        #setup-screen { padding: 20px; }
        #game-screen { display: none; flex-direction: column; height: 100vh; }
        #header { text-align: center; padding: 15px; background: white; }
        #timer-display { font-size: 40px; font-weight: bold; }
        #current-word-display { font-size: 28px; color: #e91e63; font-weight: bold; }
        #status-message { font-size: 14px; color: #d32f2f; height: 40px; padding: 5px; }
        .player-card { border: 2px solid #ddd; padding: 10px; margin: 5px; border-radius: 10px; }
        .active { border-color: #2196f3; background: #e3f2fd; }
        #word-history { display: flex; flex-wrap: wrap; gap: 5px; padding: 10px; background: #fff; }
    </style>
</head>
<body>

<div id="setup-screen">
    <h2>Kelime Türetmece</h2>
    <input type="number" id="setup-count" value="3" placeholder="Oyuncu Sayısı"><br><br>
    <input type="number" id="setup-time" value="10" placeholder="Süre"><br><br>
    <input type="number" id="setup-win-score" value="10" placeholder="Hedef Skor"><br><br>
    <div id="player-names-inputs"></div>
    <button onclick="startGame()" style="padding:15px; width:100%">Oyunu Başlat</button>
</div>

<div id="game-screen">
    <div id="header">
        <div id="timer-display">--</div>
        <div id="current-word-display">Başlamak için kelime söyle</div>
        <div id="status-message"></div>
    </div>
    <div id="players-container"></div>
    <div id="word-history"></div>
</div>

<script>
    let players = [], roundTime, winScore, currentPlayerIndex = 0, usedWords = [], currentWord = "", gameStarted = false, timerInterval;

    // Harf Dönüşüm Fonksiyonu (u->ü, ı->i, o->ö)
    function normalize(str) {
        return str.replace(/u/g, 'ü').replace(/ı/g, 'i').replace(/o/g, 'ö').toLowerCase();
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = new SpeechRecognition();
    recognition.lang = 'tr-TR';
    recognition.continuous = false;
    
    recognition.onresult = async (event) => {
        let rawWord = event.results[0][0].transcript.trim().toLowerCase().split(" ").pop();
        let word = normalize(rawWord);
        
        document.getElementById('status-message').innerText = "Duyulan: " + rawWord;

        if (!gameStarted) {
            acceptWord(word, true);
        } else {
            let lastTwo = normalize(currentWord.slice(-2));
            let startsWith = normalize(word.slice(0, 2));

            // Kural Kontrolleri
            if (usedWords.includes(word)) {
                applyPenalty("TABU! Bu kelime zaten söylendi.");
            } else if (startsWith !== lastTwo) {
                applyPenalty("Hata: '" + currentWord.slice(-2) + "' ile başlamalı!");
            } else if (/[aeıioöuü]{2,}$/.test(word)) { // Basit kural: sonu 2 sesli bitmesin
                applyPenalty("Kural: Kelime sonu 2 sesli olamaz!");
            } else {
                let isReal = await checkTDK(word);
                if (!isReal) applyPenalty("Sözlükte böyle bir kelime yok!");
                else acceptWord(word, false);
            }
        }
    };

    recognition.onend = () => { if(gameStarted) setTimeout(() => recognition.start(), 500); };

    async function checkTDK(word) {
        try {
            const res = await fetch(`https://sozluk.gov.tr/gts?ara=${word}`);
            const data = await res.json();
            return !data.error;
        } catch(e) { return true; }
    }

    function acceptWord(word, isFirst) {
        currentWord = word;
        usedWords.push(word);
        document.getElementById('current-word-display').innerText = word.toUpperCase();
        document.getElementById('word-history').innerHTML += `<span class="history-tag">${word}</span>`;
        if (isFirst) gameStarted = true;
        else { players[currentPlayerIndex].score++; nextTurn(); }
        startTimer();
    }

    function applyPenalty(msg) {
        document.getElementById('status-message').innerText = msg;
        if(players[currentPlayerIndex].score > 0) players[currentPlayerIndex].score--;
        nextTurn();
    }

    function nextTurn() {
        currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
        renderPlayers();
        startTimer();
    }

    function startTimer() {
        clearInterval(timerInterval);
        let t = roundTime;
        document.getElementById('timer-display').innerText = t;
        timerInterval = setInterval(() => {
            t--;
            document.getElementById('timer-display').innerText = t;
            if(t <= 0) nextTurn();
        }, 1000);
    }

    function startGame() {
        roundTime = document.getElementById('setup-time').value;
        let pCount = document.getElementById('setup-count').value;
        for(let i=0; i<pCount; i++) players.push({name: "P"+(i+1), score: 0});
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        renderPlayers();
        recognition.start();
    }

    function renderPlayers() {
        let h = "";
        players.forEach((p, i) => h += `<div class="player-card ${i==currentPlayerIndex?'active':''}">${p.name}: ${p.score}</div>`);
        document.getElementById('players-container').innerHTML = h;
    }

    // İlk kurulum inputları
    document.getElementById('setup-count').onchange = () => {
        let container = document.getElementById('player-names-inputs');
        container.innerHTML = "";
    };
</script>
</body>
</html>
