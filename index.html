<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kelime Türetmece</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a2e; color: #f0f0f0; }

        #setup-screen { padding: 24px; }
        #setup-screen h2 { color: #e91e8c; margin-bottom: 20px; }
        #setup-screen input {
            display: block; width: 100%; padding: 12px; margin-bottom: 14px;
            font-size: 18px; border-radius: 10px; border: 2px solid #333;
            background: #0f0f1a; color: #fff; box-sizing: border-box;
        }
        #setup-screen button {
            width: 100%; padding: 16px; font-size: 20px; font-weight: bold;
            background: #e91e8c; color: #fff; border: none; border-radius: 12px; cursor: pointer;
        }

        #game-screen { display: none; flex-direction: column; height: 100vh; overflow: hidden; }

        #header {
            background: #0f0f1a; padding: 14px 16px 10px; text-align: center;
            border-bottom: 2px solid #333; flex-shrink: 0;
        }
        #timer-display { font-size: 52px; font-weight: bold; color: #00d4ff; line-height: 1; }
        #timer-display.danger { color: #ff5252; }
        #current-word-display { font-size: 34px; color: #e91e8c; font-weight: bold; margin: 6px 0 2px; letter-spacing: 3px; }
        #suffix-hint { font-size: 13px; color: #888; min-height: 18px; }

        #status-box {
            margin: 8px 10px 0; background: #0f0f1a;
            border: 1px solid #333; border-radius: 12px; padding: 10px 14px; flex-shrink: 0;
        }
        #heard-line { font-size: 13px; color: #888; margin-bottom: 4px; }
        #heard-line b { color: #00d4ff; }
        #status-message { font-size: 14px; font-weight: bold; min-height: 20px; color: #00e676; }
        #status-message.error { color: #ff5252; }

        #players-container {
            display: flex; flex-wrap: wrap; gap: 8px;
            padding: 10px 10px 0; flex-shrink: 0; justify-content: center;
        }
        .player-card {
            flex: 1 1 70px; max-width: 120px;
            border: 2px solid #333; border-radius: 12px;
            padding: 8px; text-align: center; background: #0f0f1a;
        }
        .player-card.active { border-color: #e91e8c; background: rgba(233,30,140,0.1); }
        .player-card .p-name { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .player-card.active .p-name { color: #e91e8c; }
        .player-card .p-score { font-size: 30px; font-weight: bold; }

        #word-history {
            flex: 1; overflow-y: auto; padding: 10px 10px 16px;
            border-top: 1px solid #333; margin-top: 8px;
        }
        #history-title { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
        #history-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .history-tag {
            background: #0f0f1a; border: 1px solid #333;
            padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600;
        }
        .history-tag.latest { border-color: #e91e8c; color: #e91e8c; background: rgba(233,30,140,0.1); }
        .history-tag.tabu { border-color: #ff5252; color: #ff5252; text-decoration: line-through; opacity: 0.6; }
    </style>
</head>
<body>

<div id="setup-screen">
    <h2>Kelime Türetmece</h2>
    <input type="number" id="setup-count" value="3" placeholder="Oyuncu Sayısı">
    <input type="number" id="setup-time" value="15" placeholder="Süre (saniye)">
    <input type="number" id="setup-win-score" value="10" placeholder="Hedef Puan">
    <button onclick="startGame()">Oyunu Başlat</button>
</div>

<div id="game-screen">
    <div id="header">
        <div id="timer-display">--</div>
        <div id="current-word-display">İlk kelimeyi söyle</div>
        <div id="suffix-hint"></div>
    </div>

    <div id="status-box">
        <div id="heard-line">Bekleniyor…</div>
        <div id="status-message">—</div>
    </div>

    <div id="players-container"></div>

    <div id="word-history">
        <div id="history-title">Kelime Geçmişi</div>
        <div id="history-tags"></div>
    </div>
</div>

<script>
    let players = [], roundTime, winScore;
    let currentPlayerIndex = 0;
    let usedWords = [];
    let currentWord = "";
    let gameStarted = false;
    let timerInterval = null;
    let recognizing = false;
    let processingResult = false;

    const VOWELS = new Set(['a','e','ı','i','o','ö','u','ü']);

    function isConsonant(ch) {
        return ch && !VOWELS.has(ch);
    }

    function endsWithTwoConsonants(word) {
        if (word.length < 2) return false;
        return isConsonant(word[word.length - 1]) && isConsonant(word[word.length - 2]);
    }

    async function checkTDK(word) {
        try {
            const res = await fetch('https://sozluk.gov.tr/gts?ara=' + encodeURIComponent(word));
            const data = await res.json();
            return Array.isArray(data) && data.length > 0;
        } catch (e) {
            return true;
        }
    }

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SR();
    recognition.lang = 'tr-TR';
    recognition.continuous = false;
    recognition.interimResults = false;

    recognition.onend = () => {
        recognizing = false;
        if (gameStarted) setTimeout(safeStart, 400);
    };

    recognition.onerror = (e) => {
        recognizing = false;
        if (e.error === 'no-speech' || e.error === 'aborted') return;
        setStatus('Mikrofon hatası: ' + e.error, true);
    };

    recognition.onresult = async (event) => {
        if (processingResult) return;
        processingResult = true;

        const raw = event.results[0][0].transcript.trim().toLowerCase().split(' ').pop();
        const word = raw;

        setHeard(raw);

        if (!gameStarted) {
            const real = await checkTDK(word);
            if (!real) {
                setStatus('❌ TDK\'da bulunamadı: "' + word + '"', true);
                processingResult = false;
                return;
            }
            acceptWord(word, true);
            processingResult = false;
            return;
        }

        // 1. Tabu
        if (usedWords.includes(word)) {
            addHistoryTag(word, true);
            players[currentPlayerIndex].score = Math.max(0, players[currentPlayerIndex].score - 1);
            setStatus('⛔ TABU! "' + word + '" zaten söylendi → -1 puan', true);
            renderPlayers();
            processingResult = false;
            doNextTurn();
            return;
        }

        // 2. Son 2 harfle başlamalı
        const lastTwo = currentWord.slice(-2);
        if (word.slice(0, 2) !== lastTwo) {
            setStatus('❌ Kural hatası: "' + lastTwo.toUpperCase() + '" ile başlamalıydı, "' + word + '" söylendi.', true);
            processingResult = false;
            return;
        }

        // 3. 2 sessiz harfle bitme
        if (endsWithTwoConsonants(word)) {
            setStatus('❌ Geçersiz: "' + word + '" 2 sessiz harfle bitiyor.', true);
            processingResult = false;
            return;
        }

        // 4. TDK
        const real = await checkTDK(word);
        if (!real) {
            setStatus('❌ TDK\'da bulunamadı: "' + word + '"', true);
            processingResult = false;
            return;
        }

        acceptWord(word, false);
        processingResult = false;
    };

    function safeStart() {
        if (!recognizing && gameStarted) {
            recognizing = true;
            recognition.start();
        }
    }

    function acceptWord(word, isFirst) {
        const prev = document.querySelector('.history-tag.latest');
        if (prev) prev.classList.remove('latest');

        currentWord = word;
        usedWords.push(word);

        document.getElementById('current-word-display').innerText = word.toUpperCase();
        addHistoryTag(word, false);

        if (isFirst) {
            setStatus('✅ Oyun başladı!', false);
            document.getElementById('suffix-hint').innerText =
                '"' + word.slice(-2).toUpperCase() + '" ile başla — ' + players[0].name + "'nin sırası";
            gameStarted = true;
            startTimer();
        } else {
            players[currentPlayerIndex].score++;
            setStatus('✅ Doğru! +1 puan → ' + players[currentPlayerIndex].name, false);
            renderPlayers();
            if (players[currentPlayerIndex].score >= winScore) {
                endGame();
                return;
            }
            doNextTurn();
        }
    }

    function doNextTurn() {
        currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
        renderPlayers();
        if (currentWord) {
            document.getElementById('suffix-hint').innerText =
                '"' + currentWord.slice(-2).toUpperCase() + '" ile başla — ' + players[currentPlayerIndex].name + "'nin sırası";
        }
        startTimer();
    }

    function startTimer() {
        clearInterval(timerInterval);
        let t = roundTime;
        updateTimer(t);
        timerInterval = setInterval(() => {
            t--;
            updateTimer(t);
            if (t <= 0) {
                clearInterval(timerInterval);
                setStatus('⏱ Süre doldu! Sıra geçti.', true);
                setTimeout(doNextTurn, 700);
            }
        }, 1000);
    }

    function updateTimer(t) {
        const el = document.getElementById('timer-display');
        el.innerText = t;
        el.className = t <= 4 ? 'danger' : '';
    }

    function endGame() {
        gameStarted = false;
        clearInterval(timerInterval);
        recognition.abort();
        const winner = players[currentPlayerIndex];
        const scores = players.map(p => p.name + ': ' + p.score).join('\n');
        alert('🏆 ' + winner.name + ' KAZANDI!\n\nSonuçlar:\n' + scores);
        location.reload();
    }

    function addHistoryTag(word, isTabu) {
        const tag = document.createElement('span');
        tag.className = 'history-tag ' + (isTabu ? 'tabu' : 'latest');
        tag.innerText = word;
        document.getElementById('history-tags').prepend(tag);
    }

    function setHeard(raw) {
        document.getElementById('heard-line').innerHTML = 'Duyulan: <b>' + raw + '</b>';
    }

    function setStatus(msg, isError) {
        const el = document.getElementById('status-message');
        el.innerText = msg;
        el.className = isError ? 'error' : '';
    }

    function renderPlayers() {
        let h = '';
        players.forEach((p, i) => {
            h += '<div class="player-card ' + (i === currentPlayerIndex ? 'active' : '') + '">'
               + '<div class="p-name">' + p.name + '</div>'
               + '<div class="p-score">' + p.score + '</div>'
               + '</div>';
        });
        document.getElementById('players-container').innerHTML = h;
    }

    function startGame() {
        roundTime = parseInt(document.getElementById('setup-time').value) || 15;
        winScore  = parseInt(document.getElementById('setup-win-score').value) || 10;
        const pCount = parseInt(document.getElementById('setup-count').value) || 3;

        for (let i = 0; i < pCount; i++) players.push({ name: 'P' + (i + 1), score: 0 });

        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';

        renderPlayers();
        setStatus('İlk kelimeyi mikrofona söyle!', false);
        recognizing = true;
        recognition.start();
    }
</script>
</body>
</html>
