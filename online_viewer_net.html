<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Otomatik Kelime Türetmece</title>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #f0f2f5; color: #333; overflow-x: hidden; }
        
        /* Kurulum Ekranı */
        #setup-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 300; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .setup-group { margin-bottom: 15px; }
        .setup-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .setup-group input { width: 100%; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        #player-names-inputs input { margin-bottom: 10px; }
        .btn-start { width: 100%; padding: 15px; font-size: 18px; font-weight: bold; background-color: #4CAF50; color: white; border: none; border-radius: 10px; cursor: pointer; margin-top: 20px; }

        /* Oyun Ekranı */
        #game-screen { display: none; flex-direction: column; height: 100vh; }
        #header { text-align: center; padding: 15px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #timer-display { font-size: 56px; font-weight: bold; }
        #current-word-display { font-size: 24px; color: #e91e63; font-weight: bold; margin-top: 10px; height: 30px; }
        #status-message { font-size: 14px; color: #666; margin-top: 5px; }

        /* Oyuncular */
        #players-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 15px; flex-grow: 1; align-content: flex-start; }
        .player-card { display: flex; flex-direction: column; align-items: center; width: 45%; max-width: 160px; transition: 0.3s; }
        .player-card.active .btn-main { background-color: #bbdefb; border-color: #2196f3; box-shadow: 0 0 15px rgba(33, 150, 243, 0.5); transform: scale(1.05); }
        .btn-main { width: 100%; padding: 15px 5px; font-size: 18px; font-weight: bold; background-color: white; border: 2px solid #dee2e6; border-radius: 12px; cursor: pointer; margin-bottom: 5px; text-align: center; }
        .btn-minus { width: 50%; padding: 5px; font-size: 16px; background-color: #ffebee; border: 1px solid #ffcdd2; color: #d32f2f; border-radius: 8px; cursor: pointer; }

        /* Kelime Geçmişi */
        #word-history { background: white; padding: 10px; height: 100px; overflow-y: auto; border-top: 1px solid #ccc; font-size: 14px; display: flex; flex-wrap: wrap; gap: 5px; }
        .history-tag { background: #e0e0e0; padding: 3px 8px; border-radius: 15px; }

        /* Kazanan Ekranı */
        #winner-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(76, 175, 80, 0.95); color: white; justify-content: center; align-items: center; flex-direction: column; font-size: 36px; font-weight: bold; z-index: 400; text-align: center; padding: 20px;}
        .btn-restart { margin-top: 30px; padding: 15px 30px; font-size: 20px; background: white; color: #4CAF50; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <h2 style="text-align: center;">Kelime Türetmece Ayarları</h2>
        
        <div class="setup-group">
            <label>Kişi Sayısı (2-10):</label>
            <input type="number" id="setup-count" value="3" min="2" max="10" onchange="generateNameInputs()">
        </div>
        <div class="setup-group">
            <label>Tur Süresi (Saniye):</label>
            <input type="number" id="setup-time" value="10" min="3">
        </div>
        <div class="setup-group">
            <label>Kazanma Skoru:</label>
            <input type="number" id="setup-win-score" value="10" min="1">
        </div>
        
        <div class="setup-group" id="player-names-inputs">
            </div>

        <button class="btn-start" onclick="startGame()">Oyunu Başlat</button>
        <p style="font-size: 12px; color: #666; text-align: center; margin-top: 15px;">Oyuna başladıktan sonra telefonun mikrofonuna ilk kelimeyi söyleyerek sayacı tetikleyin.</p>
    </div>

    <div id="game-screen">
        <div id="header">
            <div id="timer-display">Bekleniyor...</div>
            <div id="current-word-display">MİKROFON DİNLİYOR</div>
            <div id="status-message">Oyunu başlatmak için bir kelime söyleyin</div>
        </div>

        <div id="players-container">
            </div>

        <div id="word-history">
            </div>
    </div>

    <div id="winner-overlay">
        <div id="winner-name">Oyuncu Kazandı!</div>
        <button class="btn-restart" onclick="location.reload()">Yeni Oyun</button>
    </div>

    <script>
        // Oyun Değişkenleri
        let players = [];
        let roundTime = 10;
        let winScore = 10;
        let currentTime = 10;
        let currentPlayerIndex = 0;
        let timerInterval = null;
        let usedWords = [];
        let currentWord = "";
        let gameStarted = false; // İlk kelime söylendiğinde true olacak

        // Ses Tanıma Ayarları
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if(SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'tr-TR';
            recognition.continuous = true;
            recognition.interimResults = false;
        }

        // Ses Sentezleyici (Dışarıdan dosya indirmemek için kodla ses üretimi)
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playSound(type) {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'blink') {
                // Doğru cevap sesi (Tiz ve kısa)
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'daat') {
                // Süre bitti / Hata sesi (Pes ve uzun)
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        // Kurulum Ekranı: İsim Girişlerini Oluştur
        function generateNameInputs() {
            const count = parseInt(document.getElementById('setup-count').value);
            const container = document.getElementById('player-names-inputs');
            container.innerHTML = '<label>Oyuncu İsimleri:</label>';
            for (let i = 0; i < count; i++) {
                container.innerHTML += `<input type="text" id="p-name-${i}" placeholder="${i+1}. Oyuncu İsmi" value="Oyuncu ${i+1}">`;
            }
        }
        window.onload = generateNameInputs; // Sayfa açılınca inputları oluştur

        // Oyunu Başlat (Kurulumdan Oyun Ekranına Geçiş)
        function startGame() {
            // Ses sistemini başlatmak için kullanıcı etkileşimi şarttır
            if (!audioCtx) audioCtx = new AudioContext();
            audioCtx.resume();

            roundTime = parseInt(document.getElementById('setup-time').value);
            winScore = parseInt(document.getElementById('setup-win-score').value);
            const count = parseInt(document.getElementById('setup-count').value);
            
            players = [];
            for (let i = 0; i < count; i++) {
                players.push({
                    name: document.getElementById(`p-name-${i}`).value || `Oyuncu ${i+1}`,
                    score: 0
                });
            }

            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            
            renderPlayers();
            highlightCurrentPlayer();

            // Mikrofonu Başlat
            if(recognition) {
                try {
                    recognition.start();
                } catch(e) {}
                
                recognition.onresult = handleSpeechResult;
                recognition.onend = () => { if(gameStarted) recognition.start(); }; // Kapanırsa geri aç
            } else {
                alert("Tarayıcınız ses tanımayı desteklemiyor. Oyunu manuel butonlarla oynamanız gerekecek.");
            }
        }

        // Oyuncuları Ekrana Çiz
        function renderPlayers() {
            const container = document.getElementById('players-container');
            container.innerHTML = '';
            players.forEach((p, index) => {
                container.innerHTML += `
                    <div class="player-card" id="card-${index}">
                        <button class="btn-main" onclick="manualCorrect(${index})">${p.name}<br><span id="score-${index}">${p.score}</span></button>
                        <button class="btn-minus" onclick="manualPenalty(${index})">-1 Ceza</button>
                    </div>
                `;
            });
        }

        function highlightCurrentPlayer() {
            document.querySelectorAll('.player-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`card-${currentPlayerIndex}`).classList.add('active');
        }

        // TDK API ile Kelime Kontrolü
        async function checkRealWord(word) {
            try {
                // TDK'nın genel aramasına istek atıyoruz
                const response = await fetch(`https://sozluk.gov.tr/gts?ara=${word}`);
                const data = await response.json();
                // Eğer hata döndüyse veya sözlükte yoksa 'error' döner
                if (data.error) return false;
                return true;
            } catch (error) {
                // İnternet yoksa veya CORS hatası olursa, oyunu bozmamak için kelimeyi doğru kabul et (Biz aramızda dikkat ederiz mantığı)
                console.log("TDK bağlantısı başarısız, kelime güvenli sayıldı.");
                return true; 
            }
        }

        // Ses Algılandığında Çalışan Ana Mantık
        async function handleSpeechResult(event) {
            // Son algılanan cümleyi alıp, boşluklara bölüp son kelimeyi seçiyoruz
            const transcript = event.results[event.results.length - 1][0].transcript.trim();
            const words = transcript.split(" ");
            let spokenWord = words[words.length - 1].toLocaleLowerCase('tr-TR');

            document.getElementById('status-message').innerText = `Duyulan: ${spokenWord}`;

            // Oyun henüz başlamadıysa ilk söylenen kelimeyi başlangıç kelimesi kabul et
            if (!gameStarted) {
                const isReal = await checkRealWord(spokenWord);
                if(isReal) {
                    acceptWord(spokenWord, true); // true = ilk kelime
                } else {
                    document.getElementById('status-message').innerText = "Bu gerçek bir kelime değil!";
                    playSound('daat');
                }
                return;
            }

            // OYUN İÇİ KONTROLLER
            const lastTwoLetters = currentWord.slice(-2);
            
            // 1. Kural: Önceki kelimenin son iki harfiyle mi başlıyor?
            if (!spokenWord.startsWith(lastTwoLetters)) {
                applyPenalty("Kelime '" + lastTwoLetters + "' ile başlamıyor!");
                return;
            }

            // 2. Kural: Daha önce söylendi mi?
            if (usedWords.includes(spokenWord)) {
                applyPenalty("Bu kelime zaten söylendi!");
                return;
            }

            // 3. Kural: Gerçek bir kelime mi? (TDK)
            const isReal = await checkRealWord(spokenWord);
            if (!isReal) {
                applyPenalty("Gerçek bir Türkçe kelime bulunamadı!");
                return;
            }

            // Tüm kurallar geçildi, doğru kelime!
            acceptWord(spokenWord, false);
        }

        // Doğru Kelime Kabul Edildiğinde
        function acceptWord(word, isFirstWord) {
            playSound('blink');
            currentWord = word;
            usedWords.push(word);
            
            document.getElementById('current-word-display').innerText = currentWord.toUpperCase('tr-TR');
            document.getElementById('status-message').innerText = "Doğru!";
            
            // Geçmişe Ekle
            const historyDiv = document.getElementById('word-history');
            historyDiv.innerHTML += `<span class="history-tag">${word}</span>`;
            historyDiv.scrollTop = historyDiv.scrollHeight;

            if (isFirstWord) {
                gameStarted = true;
                startTimer(); // Sayacı ilk defa başlat
            } else {
                // Puan Ver ve Sıra Atla
                players[currentPlayerIndex].score++;
                document.getElementById(`score-${currentPlayerIndex}`).innerText = players[currentPlayerIndex].score;
                checkWinner();
                nextTurn();
            }
        }

        // Hata Durumunda Ceza Kes ve Sıra Atla
        function applyPenalty(reason) {
            playSound('daat');
            document.getElementById('status-message').innerText = reason;
            
            if (players[currentPlayerIndex].score > 0) {
                players[currentPlayerIndex].score--;
                document.getElementById(`score-${currentPlayerIndex}`).innerText = players[currentPlayerIndex].score;
            }
            nextTurn();
        }

        // Sırayı Sonraki Oyuncuya Geçir
        function nextTurn() {
            currentPlayerIndex = (currentPlayerIndex + 1) % players.length;
            highlightCurrentPlayer();
            startTimer(); // Süreyi yeni kişi için baştan başlat
        }

        // Zamanlayıcı
        function startTimer() {
            clearInterval(timerInterval);
            currentTime = roundTime;
            document.getElementById('timer-display').innerText = currentTime;
            
            timerInterval = setInterval(() => {
                currentTime--;
                document.getElementById('timer-display').innerText = currentTime;
                
                if (currentTime <= 0) {
                    clearInterval(timerInterval);
                    playSound('daat');
                    document.getElementById('status-message').innerText = "Süre Doldu! Sıra Geçti.";
                    nextTurn(); // Süre bitince otomatik diğerine geç
                }
            }, 1000);
        }

        // Kazanma Durumu Kontrolü
        function checkWinner() {
            if (players[currentPlayerIndex].score >= winScore) {
                clearInterval(timerInterval);
                if(recognition) recognition.stop();
                document.getElementById('winner-name').innerText = `${players[currentPlayerIndex].name} KAZANDI! 🎉`;
                document.getElementById('winner-overlay').style.display = 'flex';
            }
        }

        // Manuel Müdahale Butonları (Ses algılamazsa veya gürültü olursa)
        function manualCorrect(index) {
            if(!gameStarted) return;
            playSound('blink');
            players[index].score++;
            document.getElementById(`score-${index}`).innerText = players[index].score;
            checkWinner();
            // Tıklanan kişiden sonrakine geç
            currentPlayerIndex = index;
            nextTurn();
        }

        function manualPenalty(index) {
            if (players[index].score > 0) {
                players[index].score--;
                document.getElementById(`score-${index}`).innerText = players[index].score;
            }
        }
    </script>
</body>
</html>
